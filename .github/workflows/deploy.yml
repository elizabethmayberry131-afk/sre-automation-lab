name: Build and Push to ECR & GHCR

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          GHCR_REGISTRY: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd devops-app
          docker build -t devops-app .

          # Tag and Push to AWS ECR
          docker tag devops-app:latest $ECR_REGISTRY/devops-app:$IMAGE_TAG
          docker tag devops-app:latest $ECR_REGISTRY/devops-app:latest
          docker push $ECR_REGISTRY/devops-app --all-tags

          # Tag and Push to GitHub (GHCR)
          docker tag devops-app:latest $GHCR_REGISTRY:$IMAGE_TAG
          docker tag devops-app:latest $GHCR_REGISTRY:latest
          docker push $GHCR_REGISTRY --all-tags
